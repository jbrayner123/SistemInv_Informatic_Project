name: Master/Main CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-test:
    name: Backend CI (FastAPI)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Instalamos flake8 para revisión de sintaxis
        pip install flake8
        
    - name: Lint with flake8
      working-directory: ./backend
      run: |
        # Detenemos el build si hay errores graves de sintaxis o variables indefinidas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Las advertencias las permitimos sin frenar el build (exit-zero)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-test:
    name: Frontend CI (React+Vite)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
        
    - name: Build and Type Check
      working-directory: ./frontend
      # Esto simulará el proceso de empaquetado y se asegurará que el frontend no esté "roto"
      run: npm run build
