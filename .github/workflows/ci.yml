name: SistemInv CI/CD Pipeline

on:
  push:
    branches:
      - 'feature/*'
      - 'main'
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend CI (FastAPI Tests)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
        
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Pytest with Coverage
      working-directory: ./backend
      # Se requiere mínimo 70% de cobertura de código
      run: |
        pytest test_main.py --cov=main --cov-fail-under=70 --cov-report=term-missing

  frontend-test:
    name: Frontend CI (React+Vite)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
        
    - name: Build and Validate
      working-directory: ./frontend
      run: npm run build

  continuous-deployment:
    name: Continuous Deployment (CD)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    # Se despliega solo si estamos en la rama MAIN y pasaron todas las pruebas
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Trigger Render Deploy Hook
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK" ]; then
          curl -X POST $RENDER_DEPLOY_HOOK
          echo "Deployment triggered successfully on Render."
        else
          echo "No deploy hook found. Assuming Render auto-deploy is linked to GitHub push events."
        fi
